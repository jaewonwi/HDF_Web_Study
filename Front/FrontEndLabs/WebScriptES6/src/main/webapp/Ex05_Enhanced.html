<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
        ES6 향상된 객체 리터럴
        (Enhanced Object Literal) >> JSON

        객체에 대한 표기를 간결하게 할 수 있다.
        */
        const dataObj = {
            language:"javascript",
            coding:function(){
                console.log(this.language + + " ... coding");
            }
        };

        const language = "java";
        const dataObj2 = {language};
        // 풀어쓰면 ... const dataObj2 = {language:language}; ... const dataObj2 = {language:"java"}; 

        // 원래의 객체 표기법 > {key:value}
        // key하고 value가 같으면 생략하고 하나만 표기

        // vue, react ...
        const dataObj3 = {
            coding:function(){
                console.log("hello world coding");
            }
        }
        dataObj3.coding();
        
        // 위의 dataObj3를 축약하면...
        const dataObj4 = {
            coding() {      // coding:function(){ 부분을 축약 > 함수의 축약 !
                console.log("hello world coding")
            }
        }
        

    </script>
</head>
<body>
    
</body>
</html>

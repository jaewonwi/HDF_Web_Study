<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>box-sizing 비교</title>

<style>
body {
	font-family: Arial;
	padding: 30px;
}

/* 부모 박스 */
.container {
	width: 300px;
	border: 3px dashed red;
	margin-bottom: 50px;
}

/* 공통 */
.box {
	width: 300px;
	padding: 30px;
	border: 10px solid blue;
	background-color: lightblue;
}

/* content-box */
.content-box {
	box-sizing: content-box;
}

/* border-box */
.border-box {
	box-sizing: border-box;
}

h2 {
	margin-bottom: 10px;
}

.info {
	margin-top: 10px;
	background: #f1f1f1;
	padding: 10px;
}
</style>
</head>

<body>

	<h1>box-sizing 비교</h1>

	<!-- content-box -->
	<h2>1. content-box</h2>

	<div class="container">
		<div class="box content-box">content-box</div>
	</div>

	<div class="info">
		width:300px + padding + border 추가됨<br> 실제 크기 증가
	</div>

	<hr>

	<!-- border-box -->
	<h2>2. border-box</h2>

	<div class="container">
		<div class="box border-box">border-box</div>
	</div>

	<div class="info">
		padding + border 포함해서<br> 전체 크기 300px 유지
	</div>

</body>
</html>

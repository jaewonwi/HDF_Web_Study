<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
	<style type="text/css">
		/*
			개발자에게 필수적인 CSS(selector: css, javascript, jquery)
			
			1. 기본 선택자(기존에 있는 태그를 찾아서): p, div, hr, h3
			   p {color:red;}
		    2. , 다중 선택자(group)
		       p, h2, h3, h4{color:blue;}
		    3. . > class
		       # > id
		       (ex. .my-color{color:red;} -> <div class="my-color"></div>)
		    4. 결합 선택자
		       p{}
		   	   p.one {border:1px} -> <p class="one"></p> 
		       p.two {border:1px} -> <p class="two"></p>
		    
		    5. 자손(후손)을 찾아서 선택자 적용 가능
		       div p{color:green}
		    
		    6. 자식 선택자 (!= 자손. 자손이 자식보다 범위가 넓다.)
		       .parent > p
		       <div calss="parent">
		       		<p>Hello</p>
		       </div>
		    
		    7. 속성 선택자
		       input[type=text] {color:red;}
		    
		    8. + 인접한 형제, ~ 일반형제
		    
		    9. 가상 선택자
		    	   a:link 의미 해석
		    
		*/
		
		div p{color:green; font-family:"궁서체","명조체","광수체";}
		.parent > p {color:red; border:1px double blue; padding:10px; font-size:15px;}
		
	</style>

	<title>Insert title here</title>
</head>
<body>
	<p>나는 어떤 스타일이 적용될까?</p>
	<div>div 태그</div>
	<h3>하위 자손 선택자</h3>
	<div>
		<p>선택자</p>
		<p>선택자2
			<p>선택자3</p>
		</p>
		<div>
			<p>선택자4</p>
		</div>
		<h3>자식 선택자</h3>
		<div class="parent">
			<p>문단태그</p>
		</div>
		<hr>
		<input type="text" value="css적용">
		<input type="text" value="css적용">
	</div>
	<hr>
	
</body>
</html>

<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
	<style type="text/css">
		body {background-color: gray;}
		h3 {color:tomato;}
	</style>
	<link rel="stylesheet" href="css/common.css">
</head>
<body>
<!-- 
개발자 Css 적용하는 방법 
Inline   - by using the style attribute inside HTML elements
Internal - by using a <style> element in the <head> section
External - by using a <link> element to link to an external CSS file : Common.css
 
 inline   > <p style="">
 Internal > <style type= 현재 페이지만 적용
 External > 별도의 폴더 관리 > common.css ,header.css ,bottom.css
 
 -->
 	<h3>inline 태그 안쪽</h3>
 	<p style="background-color:red">문단태그 안에 css 적용</p>
 
    <h3>internal 방식(Page)</h3>
    <h3 style="color:green;">나는 무슨색</h3>
    
    <h3>external 방식 (외부 Css) : 프로젝트 적용</h3>
    <h1>외부 css 적용</h1>
    
    <hr>
    <p title='john "aaa" hello'>title</p>
    <p title="john 'aaa' hello">title</p>
    
    <br>
    <a href="https://www.w3schools.com/" target="_blank">new Tab</a> 
    <a href="https://www.w3schools.com/" target="_self">current Tab</a> 
</body>
</html>

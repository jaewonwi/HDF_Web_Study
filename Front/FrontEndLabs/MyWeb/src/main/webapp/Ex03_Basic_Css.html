<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
	<script type="text/javascript"></script>
	<style type="text/css">
		/* 
		:link  가상 선택자 (의미를 가지고 속성을 부여)
		 */
		a:link {color:red;}
		a:visited {color:green;}
		a:hover {color:gold;}
		a:active {color:blue;}
		
		/*
		개발자 (만들어지 CSS Html 적용하는 방법)
		1. 선택자(selector) > css 만 아니요 >> javascript 적용
		2. 태그를 찿는다 ...
		3. p , h3 , div , hr 
		*/
		
		h4 {color:pink;}
		/* 단일 선택자  */
		
		h1,h2,h3 {color:tomato;}
		/* 다중 선택자 */
		
		/*
		***** Today Point (사용자 정의 CSS)
		 1. . >> 태그에서는 class 속성 Css적용   (현재 페이지에서 여러번 사용)
		 2. # >> 태그에서 id 속성 Css 적용      (현재 페이지에서 한번만 사용)
		*/
		
		.hong {color:gray;} /* html 적용하기 위해서 class="hong"  */
		#kglim{color:red}   /* html 적요하기 위해서 id="kglim"  식별자의 의미 */
	</style>
</head>
<body>
	<a href="http://president.go.kr">방문하기</a>
	<br>
	<h1>h1</h1>
	<h2>h2</h2>
	<h3>h3</h3>
	<hr>
	<p id="kglim">id라는 속성을 이용해서 Css 적용</p>
	<p class="hong">css적용</p>
	<p class="hong">css적용</p>
	<p class="hong">css적용</p>
</body>
</html>

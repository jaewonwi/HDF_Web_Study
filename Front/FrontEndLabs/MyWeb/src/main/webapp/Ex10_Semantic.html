<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Semantic Layout</title>

<style>

	.container{
	    width:600px;
	    margin:auto;
	}
	
	header{
	    height:50px;
	    background:black;
	}
	
	main{
	    display:flex;
	    gap:10px;
	    margin-top:10px;
	}
	
	aside{
	    width:100px;
	    height:300px;
	    background:gray;
	}
	
	section{
	    flex:1;
	    height:300px;
	    background:gray;
	}
	
	footer{
	    height:50px;
	    background:black;
	    margin-top:10px;
	}

</style>
</head>

<body>

<div class="container">
    <header></header>
    <main>
        <aside></aside>
        <section></section>
    </main>
    <footer></footer>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
            onload 이벤트가 발생하는 시점 -> DOM 객체 생성 후에
            
            1. <body onload="call()"
            2. window.onload = call();
            3. window.onload = function(){} // 익명함수(일회성) ... 어차피 onload는 한 번 사용하고 사용하지 않을 거니까

        */

        window.onload = function(){
            // onload 함수는 모든 요소가 memory에 DOM 객체 형태로 생성이 끝난 후에 호출됨을 보장
            let out = "";
            out += "<ul>";
                out += "<li>A</li>";
                out += "<li>B</li>";
            out += "<ul>";

            document.body.innerHTML = out;  // innerHTML(<body> 내부)을 덮어쓴다.
            
            // DOM > 동적 > 기존에 없던 태그 추가/수정/삭제 가능
            const header = document.createElement("h1");
            // header = <h1></h1>

            const textNode = document.createTextNode("안뇽");     // tree 형태
            header.appendChild(textNode);   // header에 textNode를 자식으로 붙임
            // header = <h1>hello</h1>

            document.body.appendChild(header);  // body에 header를 자식으로 붙인다. -> ul과 header는 형제     

            const img = document.createElement("img");
            img.setAttribute("src","images/1.jpg");
            img.setAttribute("width","300px");
            img.setAttribute("height","300px");
            document.body.appendChild(img);
        }
    </script>
</head>
<body>
    HELLO WORLD    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="mylist"><li>coffee</li><li>tea</li><li>milk</li></ul>
    <button onclick="myFunc()">클릭</button>
    <button onclick="myFunc2()">클릭2</button>
</body>
<script>
    function myFunc(){
        let list = document.getElementById("mylist");
        console.log(list);

        list.removeChild(list.childNodes[0]);   // childNodes
        /*
            * 태그를 배열 요소로 접근
            <ul><li></li><li></li><li></li></ul> -> list.childNodes
            <select><option></option>...<option></option></select> -> options
        */
    }

    function myFunc2(){
        let textNode = document.createTextNode("water");
        let item = document.getElementById("mylist").childNodes[0];
        console.log(item);      //<li>coffee</li>
        console.log(item.childNodes[0]);    //coffee

        item.replaceChild(textNode, item.childNodes[0]);    // coffee -> water
    }
</script>
</html>

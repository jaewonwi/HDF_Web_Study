<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type=""text/javascript">
        let str = "10+20+30";
        document.write(str + "<br>");

        // 1. eval()
        // 문자열 수식 > 계산식으로 > "10+20+30" > eval() > 10+20+30

        // "10A+20+30" > 자동으로 ascii 변환 X > 예외 발생
        document.write("eval() : "+eval(str)+"<br>");



        // 2. isNaN()
        // 너 숫자 아니니? > is Not a Numbemr ? > true(숫자X)/false(숫자)
        document.write(isNaN("12345")+"<br>");      // false 
        document.write(isNaN("12A345")+"<br>");     // true(숫자X)
        document.write(isNaN("대한민국")+"<br>");    // true(숫자X)
        document.write(isNaN('12345')+"<br>");      // false(숫자)
        
        let i = "100";
        let j = "200";
        document.write("결합    : "+ (i+j)+"<br>");        
        document.write(Number(i) + Number(j));

        // Number()
        // parseInt()
    </script>

</head>

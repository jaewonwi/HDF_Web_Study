<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
    /*
        1. 배열 > [] > const arr = [] > push(), pop() 권장
        2. JSON > {} > const obj = {} > obj.속성명, obj[key속성명]

        xml, json: 이기종의 데이터 교환 포맷
    */
        let students = [];
        students.push({이름:"홍길동", 국어:80, 영어:60});
        students.push({이름:"김유신", 국어:90, 영어:80});
        students.push({이름:"이순신", 국어:100, 영어:70});

        for (let index in students){
            students[index].getSum = function(){ return this.국어 + this.영어; };
            students[index].getAvg = function(){ return this.getSum() / 2; };
        }

        // [{이름:"홍길동", 국어:80 ... , getSum: function(){}},] 이렇게도 구현 가능함

        console.log(students);
        for (let index in students){
            console.log(students[index].이름);
            console.log(students[index].getSum());
            console.log(students[index].getAvg());
        }
    </script>
    
</head>
<body>
    
</body>
</html>

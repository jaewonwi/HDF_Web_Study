<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = function(){
            // DOM 계층트리 : node 개념 (부모,자식,형제 개념으로 자원에 접근 가능)
            let meNode;
            meNode = document.getElementById("me"); // <div id="me">C</div>
            meNode.style.backgroundColor = "yellow";

            let parentNode = meNode.parentNode; // <body>
            parentNode.style.backgroundColor = "skyblue";

            let grandNode = parentNode.parentNode;  // html
            grandNode.style.backgroundColor = "green";

            let my = document.getElementById("mychild");
            console.log(my);    // <ul id="mychild"><li>AA</li><li>BB</li><li>CC</li></ul>
            console.log(my.firstChild.nodeName);    // LI
            console.log(my.firstChild.innerText);   // AA

            // value 속성이 없는 친구들 : div, p, li, span
            // innerText 또는 innerHTML로 안에 있는 값을 가져올 수 있음 ... <div><h1>안에 있는 값</h1></div> ... (innerHTML은 h1 살려서)

            console.log(my.firstChild.nextSibling.innerText);   // BB
            console.log(my.hasChildNodes);
            console.log(my.childNodes);
            console.log(my.childNodes.length);
            console.log(my.childNodes[0]);  // 배열 첨자 접근 [index]
        }
    </script>
</head>
<body>
    <div>A</div><div>B</div><div id="me">C</div><div>D</div><div>E</div>
    <ul id="mychild"><li>AA</li><li>BB</li><li>CC</li></ul>
</body>
</html>

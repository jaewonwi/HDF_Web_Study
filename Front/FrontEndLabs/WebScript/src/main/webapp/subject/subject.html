<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Insert title here</title>
    <!--  
    [규칙]
    기본급여  : (정수값)
    기타수당  : 국가유공자 + 5년이상 근속
    총액      : (기본급 + 자격증 수당 + 자녀 수당 + 기타 수당)
    세금      : 기본급 * 0.22 
    실수령액  : 총액 - 세금
    연봉      : 실수령액  * 12 + 기본급
    천단위 콤마 처리 : 자율 (표현식 , 로직)
    10,000,000원 
    -->
</head>

<body>
    <h2>급여 관리 시스템 지원 양식</h2>
    <form name="payManage">
        <table>
            <tr>
                <td>성명: </td>
                <td><input type="text" name="name" size="20"></td>
            </tr>
            <tr>
                <td>기본급: </td>
                <td><input type="text" name="basicPay" size="20"></td>
            </tr>
            <tr>
                <td>자격증 수당: </td>
                <td><input type="radio" name="license" value="150000">기사 150,000원
                    <input type="radio" name="license" value="100000">산업기사 100,000원
                    <input type="radio" name="license" value="50000">기능사 50,000원
                </td>
            </tr>
            <tr>
                <td>자녀 수당: </td>
                <td><input type="radio" name="child" value="100000">1인 100,000원
                    <input type="radio" name="child" value="200000">2인 200,000원
                    <input type="radio" name="child" value="300000">3인 300,000원
                </td>
            </tr>
            <tr>
                <td>기타 수당: </td>
                <td><input type="checkbox" name="merit" value=100000>국가유공자 100,000원
                    <input type="checkbox" name="longterm" value=100000>5년이상 근속 100,000원
                </td>
            </tr>
            <tr>
                <td colspan="2"><input type="button" name="btn" value="계산하기" onclick="resultSal(this.form)"
                        style="margin-left: 30px">
                </td>
            </tr>
        </table>
    </form>
    <p>
    <p>
    <form name="resultForm">
        <table align="left" style="margin-left: 0px">
            <tr>
                <th colspan=2>출력 결과</th>
            </tr>
            <tr>
                <td width="100px">성명: </td>
                <td><input type=text name=resultName></td>
            <tr>
                <td>기본급: </td>
                <td><input type=text name=resultBasicPay></td>
            <tr>
                <td>자격증 수당: </td>
                <td><input type=text name=resultLicense></td>
            <tr>
                <td>자녀 수당: </td>
                <td><input type=text name=resultChild></td>
            <tr>
                <td>기타 수당: </td>
                <td><input type=text name=resultEtc></td>
            <tr>
                <td>총액: </td>
                <td><input type=text name=resultTotalPay></td>
            <tr>
                <td>세금: </td>
                <td><input type=text name=resultTax></td>
            <tr>
                <td>실수령액: </td>
                <td><input type=text name=resultPay></td>
            <tr>
                <td>연봉: </td>
                <td><input type=text name=resultYearlyPay></td>
            </tr>
        </table>
    </form>

</body>
<script>

    /*  
    [규칙]
    기본급여  : (정수값)
    기타수당  : 국가유공자 + 5년이상 근속
    총액      : (기본급 + 자격증 수당 + 자녀 수당 + 기타 수당)
    세금      : 기본급 * 0.22 
    실수령액  : 총액 - 세금
    연봉      : 실수령액  * 12 + 기본급
    천단위 콤마 처리 : 자율 (표현식 , 로직)
    10,000,000원 
    */

    // 천단위 콤마 처리 함수
    function formatComma(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function resultSal(form) {
        // 1. 기본급여 (정수값)
        const basicPay = parseInt(form.basicPay.value) || 0;

        // 2. 자격증 수당
        let licensePay = 0;
        const licenseRadios = document.getElementsByName("license");
        for (let radio of licenseRadios) {
            if (radio.checked) {
                licensePay = parseInt(radio.value) || 0;
                break;
            }
        }

        // 3. 자녀 수당
        let childPay = 0;
        const childRadios = document.getElementsByName("child");
        for (let radio of childRadios) {
            if (radio.checked) {
                childPay = parseInt(radio.value) || 0;
                break;
            }
        }

        // 4. 기타 수당 (국가유공자 + 5년이상 근속)
        let etcPay = 0;
        const meritCheckboxes = document.getElementsByName("merit");
        for (let checkbox of meritCheckboxes) {
            if (checkbox.checked) {
                etcPay += parseInt(checkbox.value) || 0;
            }
        }
        const longtermCheckboxes = document.getElementsByName("longterm");
        for (let checkbox of longtermCheckboxes) {
            if (checkbox.checked) {
                etcPay += parseInt(checkbox.value) || 0;
            }
        }

        // 5. 총액 = 기본급 + 자격증 수당 + 자녀 수당 + 기타 수당
        const totalPay = basicPay + licensePay + childPay + etcPay;

        // 6. 세금 = 기본급 * 0.22
        const tax = Math.floor(basicPay * 0.22);

        // 7. 실수령액 = 총액 - 세금
        const netPay = totalPay - tax;

        // 8. 연봉 = 실수령액 * 12 + 기본급
        const yearlyPay = netPay * 12 + basicPay;

        // 결과 출력 (resultForm에 반영)
        document.resultForm.resultName.value = form.name.value;
        document.resultForm.resultBasicPay.value = formatComma(basicPay) + '원';
        document.resultForm.resultLicense.value = formatComma(licensePay) + '원';
        document.resultForm.resultChild.value = formatComma(childPay) + '원';
        document.resultForm.resultEtc.value = formatComma(etcPay) + '원';
        document.resultForm.resultTotalPay.value = formatComma(totalPay) + '원';
        document.resultForm.resultTax.value = formatComma(tax) + '원';
        document.resultForm.resultPay.value = formatComma(netPay) + '원';
        document.resultForm.resultYearlyPay.value = formatComma(yearlyPay) + '원';
    };
</script>
</html>

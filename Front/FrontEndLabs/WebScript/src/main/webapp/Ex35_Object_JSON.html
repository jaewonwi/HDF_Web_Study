    <script>
        let myObj = {"name":"john", "age":30, "city":"seoul"};
        console.log(myObj);

        // 클라이언트 (JSON) -> 서버로 전송
        // json 데이터 -> 문자열 받아서 -> 다시 객체로 
        
        // *** POINT ***
        // JSON.parse : 문자열을 객체로
        // JSON.stringify : 객체를 문자열로

        let stringObj = JSON.stringify(myObj);
        console.log(stringObj);     // {"name":"john","age":30,"city":"seoul"}
        console.log(typeof(stringObj));

        let stringStr = '{"name":"john","age":30,"city":"seoul"}';
        console.log(stringStr);
        console.log(typeof(stringStr));
        console.log(JSON.parse(stringStr));

        let myJSON = JSON.parse(stringStr);
        console.log(myJSON);
        console.log(myJSON.name);       // 객체.속성명
        console.log(myJSON["name"]);    // 객체["속성명"]

        /*

        // Quiz. John이 가지고있는 차량의 이름, 모델명을 전부 출력하세요
        let myCars;
		
		myCars = {"name":"john" , "age":30 , "cars": [
			                                           {"name":"Ford","model":["Mustang","Focus"]},
			                                           {"name":"BMW" ,"model":["520","x5","x6"]},
			                                           {"name":"Fiat","model":["500","panda"]}
			                                          ]
		};

        console.log(myCars);
        console.log(myCars.name);
        console.log(myCars.cars);   // return Array

        for (let index in myCars.cars){
            document.write("차량이름 : "+myCars.cars[index].name);
            for (let i in myCars.cars[index].model){
                document.write("차량 모델: "+myCars.cars[index].model[i]+" ");
            }
            document.write("<hr>");
        }

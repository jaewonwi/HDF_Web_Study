<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        ul{ 
            padding: 0; 
            list-style-position: inside;
        }
        li{
            border-bottom: 1px solid #999;
            padding: 5px 0;
        }
        #add-btn{
            padding: 5px 10px;
            border: 0;
            background: #f80; 
            color: white;
            border-radius: 5px;
        }
        
        .active{ background:gold; } /* step3: 목록 클릭 스타일 */
    </style>
</head>
<body>
    <h1 id="title">Todo List</h1>
    <button id="add-btn">Add List</button>
    <ul id='list'>
        <li>할일_1</li>
        <li>할일_2</li>
        <li>할일_3</li>
        <li>할일_4</li>
    </ul>
</body>
<script>
    let title = document.getElementById("title");
    let list = document.getElementById("list");
    let li = document.getElementsByTagName("li");    // array
    let addbtn = document.getElementById("add-btn");

    function activeItem(event){
        console.log(event.target);
        console.log(event.currentTarget);

        if (event.target.nodeName == 'LI'){
            title.innerHTML = event.target.innerHTML;
        }

        for (let i = 0; i < event.target.parentNode.children.length; i++){
            event.target.parentNode.children[i].removeAttribute("class");
        }
        
        event.target.setAttribute("class", "active");
    }
    
    list.addEventListener("click", activeItem);

    addbtn.addEventListener("click", function(){
        let txt = prompt("할일 입력");
        if (txt != null){
            list.innerHTML += '<li>' + txt + '</li>';
        }
    });
    
</script>
</html>

<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>

	<script type="text/javascript">
		console.log(x); // undefined
		var x = 5;

		console.log(x) 
		
		/*
		// var를 사용하지 말아야 하는 이유

		var a = 10;
		
		
		내부적으로 해석되는 코드는********************************

</head>
<body>
		<p>scope</p>
		<p id="demo1"></p>
		<p id="demo2"></p>
</body>
<script type="text/javascript">
		var gname = "world";  //전역(global 변수) .. 이 페이지 내에서 어디든지 사용가능
		myFunction(); //호출
		function myFunction(){
			//함수 안에 변수 생성
			//local variable
			aaa = "아무개";  //사용금지 ... 타입을 안쓰면 전역변수가 됨
			console.log("지역 aaa : " + aaa);
			
			var carname="pony";
			document.getElementById("demo1").innerHTML = typeof(carname) + " " + carname + "<br>";
			document.getElementById("demo2").innerHTML = typeof(gname) + " " + gname + "<br>";
		}
		console.log(aaa);
</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
            https://www.w3schools.com/jsref/met_win_setinterval.asp

            myInterval= setInterval(function, milliseconds);
            clearInterval(myInterval);

            setInterval(function(){}, 3000);
            3초마다 function(){} 를 실행하겠다.
            
            ***** callback() 함수 *****
            : 프로그램 논리에 의해서 자동 호출되는 함수 (ex. 비동기 함수)

            function call(){}
            setInterval(call(), 3000);
            -> 얘만 사용하는데 굳이 call이라는 이름을 줄 필요가 있을까?
            -> 익명함수로 변경하자.
            setInterval(function(){}, 3000);
            
            1. 익명함수(일회성) : 재사용하지 않을 거야 (function(){})
            2. callback 포괄적인 개념 (프로그램의 논리에 의해서 자동으로 호출되는 함수)
            
        */

        let myTimer = window.setInterval(function(){
            let d = new Date();
            let t = d.toLocaleDateString();
            document.getElementById("time").innerHTML = t;
        }, 1000);

        function myTimerStop(){
            window.clearInterval(myTimer);  // clearInterval: Interval을 무효화시킴.ㄴ Interval의 주소를 넘겨주어야함.
        }
    </script>
</head>
<body>
    <p id="time"></p>
    <button onclick="myTimerStop()">stop time</button>
</body>
</html>

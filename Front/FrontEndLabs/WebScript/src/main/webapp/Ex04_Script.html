<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<script>
		let name = "hong";	// global 변수
		
		function call(){
			let age = 20;	// local 변수
			console.log('당신의 이름은 : '+name+", 나이는 : "+ age);
		}
		
		/*
			1.  변수 생성 -> 값 입력 -> 타입 생성(number, string, boolean, date ...)
				var a;		// undefined
				let b;		// undefined
				
				a = 10;		// number
				b = "A";		// string
				b = 'B';
				
				ES5 문법까지는 : var로 global, local 모두 사용
				ES6 (ECMA, 2015년) : let, const를 만들어서 global, local 명확하게 구분
				
				여전히 var, const, let 모두 있음
				신규 프로젝트를 개발할 때 무조건 let, const 사용하도록 권장한다.
				
			2.	초기화 : 변수가 최초로 값을 갖는 것
				js - 정수, 실수, boolean, 문자열, 날짜
				내부적으로는 타입 가짐 (number, boolean, string, Array, Object)
		*/
	
		// 초기화
		let n;
		console.log(n);	// undefine
		n = 100;		// 사용 전에 값을 초기화
		
		let i, j;
		i = 100;
		j = 200;
		
		const result = i + j;
		console.log(result);
		
		let intnum = 10;
		let dnum = 12.345;
		let flag = true;
		let str = null;		// object
		let str2 = 'abc';	// string
		
		console.log(typeof(intnum));
		console.log(typeof(dnum));
		console.log(typeof(flag));
		console.log(typeof(str));
		console.log(typeof(str2));
		
		// javascript 연산자
		// 산술, 논리, 관계 연산자
		// 산술연산
		let num1 = 10;
		let num2 = 3;
		
		document.write((num1/num2) + "<br>");
		document.write((num1%num2) + "<br>");
		
		// 관계연산
		// == : 값 비교 (true, false)
		// === : 값 & 타입 비교 (true, false)
		let a = 3;
		let b = 5;

		console.log(a == b);		// false
		console.log(a != b);		// true
		console.log(a > b);		// false
		
		let v = "5";
		let v2 = 5;
		let v3 = 5;
		
		console.log(v == v2);	// true (값 비교)
		console.log(v === v2);	// false (값과 type 비교)
		console.log(v2 == v3);	// true

		// 논리연산
		console.log((10 > 6) && (1 != 3));	// t && t = true
		console.log((10 < 6) || (1 != 3))	// f || t = true
		
		// 삼항연산
		let result2 = (4 % 2) == 0 ? 'even' : "odd";
		console.log(result2);
		
		// 대입연산 (+=, -=, *=, /=)
		let p = 10;
		let k = 5;
		p += k;
		console.log(p);
		
		let x = 5 + 5;
		let y = "5" + 5;		// +: 산술 & 결합
		console.log(x);		// 10
		console.log(y);		// "55"		
	</script>
</head>
<body>
	<button onclick="call()">버튼</button>
</body>
</html>

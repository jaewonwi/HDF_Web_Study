	let Grade = {
		"list":{"hong":10, "kim":20, "park":30},
		"show":function(){
			for(let key in this.list){	// 객체 {"hong":10, "kim":20, "park":30}도 배열로 인식
				document.write(key +" : "+ this.list[key]+"<br>");

			}
		}
	}
	Grade.show();

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 동적으로 테이블 생성
        // 생성된 테이블을 순차적으로 삭제하는 코드 완성

        window.onload = function(){
            // 동적으로 이벤트 걸기
            document.getElementById("b1").onclick = function(){
                let table = document.createElement("table");
                table.setAttribute("border","1");
                
                let row = parseInt(document.getElementById("txtrow").value);
                let col = parseInt(document.getElementById("txtcolumn").value);

                console.log("row: "+row);
                console.log("col: "+col);

                for (let i = 1; i <= row; i++){
                    let tr = document.createElement("tr");
                    for (let j = 1; j <= col; j++){
                        let td = document.createElement("td");
                        let textNode = document.createTextNode(i+"행 "+j+"열");
                        td.appendChild(textNode);
                        tr.appendChild(td);
                    }
                    table.appendChild(tr);
                }
                document.body.append(table);
            }

            document.getElementById("b2").onclick = function(){
                let tables = document.getElementsByTagName("table");
                let len = document.getElementsByTagName("table").length;
                console.log(len);
                document.body.removeChild(tables[len-1]);
            }
        }

    </script>
</head>
<body>
    <div id="div">
        행의수 : <input type="text" id="txtrow" name="txtrow" value="2"><br>
        열의수 : <input type="text" id="txtcolumn" name="txtcolumn" value="2"><br>
        <input type="button" id="b1"  value="동적테이블 생성">
        <input type="button" id="b2"  value="동적테이블 제거">
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .redColor{color:red}
        .blueColor{color:blue}
        .greenColor{color:green}
    </style>
    <script>
        /*
        [ jQuery Manipulating CSS ]
        addClass()    - Adds one or more classes to the selected elements
        removeClass() - Removes one or more classes from the selected elements
        toggleClass() - Toggles between adding/removing classes from the selected elements
        css()         - Sets or returns the style attribute

        [ Add New HTML Content ]
        append()  - Inserts content at the end of the selected elements
        prepend() - Inserts content at the beginning of the selected elements
        after()   - Inserts content after the selected elements
        before()  - Inserts content before the selected elements
        
        */

        $(function(){
            $('td:contains("홍길동")').addClass('redColor');
            $('td:contains("홍길동")')
                .siblings()
                .addClass('blueColor')
                .parent()
                .find('td:eq(0)')   // filter 함수
                .addClass('greenColor');

            $('#btnclick').on(
                {
                    click:function(){ alert('click!'); }
                }
            )

            $('#stylediv').on(
                {
                    mouseover:function(){
                        $(this).addClass('greenColor');
                    },
                    mouseout:function(){
                        $(this).removeClass().addClass('blueColor');
                    },
                }
            )
        })

    </script>
</head>
<body>
    <table>
		<tr>
			<td>이름</td>
			<td>나이</td>
			<td>취미</td>
		</tr>
		<tr>
			<td>홍길동</td>
			<td>50</td>
			<td>훔치기</td>
		</tr>
		<tr>
			<td>이순신</td>
			<td>10</td>
			<td>싸움</td>
		</tr>
		<tr>
			<td>학생</td>
			<td>30</td>
			<td>잠자기</td>
		</tr>
	</table>
	<hr>
	<h3>이벤트</h3>
	<a href="http://www.naver.com">네이버 바로가기</a>
	<hr>
	<div id="btnclick">click</div>
	<div id="stylediv">스타일적용</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Document</title>
    <script>
        $(document).ready(function(){
            // selector에 대한 이해는 css, js, jquery 접근을 쉽게 해준다.
            
            // 모든 요소는 memory에 올라가있다.
            
            // jquery fucntion selector
            $('body > *').css('color', 'gold');
			$('div > *').css('color', 'red');
			$('input[type=text]').css('color','green');


			/*
			DOM script : p ,div  > innerHTML , innerText (value 속성이 없는 것)
			input 태그들은 value 속성을 가지고 있다
			ex) document.getElementById("name").value 
			
			Jquery 3총사
			val() , text() , html() >> 값을  read , write >> getter ,setter
			
			parameter 여부에 따라
			val('홍길동') : write(setter)
			val()        : read(getter) 
			
			$('#userid').val() > read 
			$('#userid').val("world") > write
			
			*/

			$('input[type=text]').val('9999');	// write

			// 
			setTimeout(()=>{
				const value = $('select > option:selected').val();
				alert("selected tag value : "+value);	
			}, 3000);

        });
    </script>
</head>
<body>
    <div>
		<ul>
			<li>사과</li>
			<li>배</li>
			<li>수박</li>
		</ul>
	</div>
	<div>
		<ul>
			<li>사과2</li>
			<li>배2</li>
			<li>수박2</li>
		</ul>
	</div>
	<input type="text" value="AAA">
	<input type="text" value="BBB">
	<input type="text" value="CCC">
	<input type="password">
	<input type="radio">
	<input type="file">
	<hr>
	<table>
		<tr>
			<td>이름</td>
			<td>나이</td>
			<td>취미</td>
		</tr>
		<tr>
			<td>홍길동</td>
			<td>50</td>
			<td>훔치기</td>
		</tr>
		<tr>
			<td>이순신</td>
			<td>10</td>
			<td>싸움</td>
		</tr>
		<tr>
			<td>학생</td>

	</table>
	<hr>
	<select>

</body>
</html>
